name: Build and Test Foody API

on:
  push:
    branches:
      - main

env:
  FOODY_USER: ${{ secrets.FOODY_USER }}
  FOODY_PASS: ${{ secrets.FOODY_PASS }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore Exam-Prep-BackEnd-QA.sln

      - name: Build solution
        run: msbuild Exam-Prep-BackEnd-QA.sln /p:Configuration=Release

      - name: Run tests
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vstestPaths = & $vswhere -latest -products * -requires Microsoft.VisualStudio.PackageGroup.TestTools.Core -find **\vstest.console.exe

          if (-not $vstestPaths) {
            Write-Error "vstest.console.exe not found"
            exit 1
          }

          $vstest = $vstestPaths | Select-Object -First 1

          Write-Host "Using vstest at: $vstest"

          & $vstest "The-Foody-System\bin\Release\The-Foody-System.dll" /logger:console